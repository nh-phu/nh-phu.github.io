<!DOCTYPE html>
<html>
<body>

    <h1>Smart age calculator</h1>

    <h4>Enter your age</h4>
    <input type="text" id="userAge">
    <button onclick="tellAge()">Enter</button>

    <p id="output"></p>

    <script>
        function tellAge() {
            const age = document.getElementById('userAge').value;
            const display = document.getElementById('output');

            if (isNaN(age)) {
            display.innerText = "Wtf is " + age + "? Enter a real number.";
            } else {
            display.innerText = "Your age is " + age + ".";
            }
        }
        const inputField = document.getElementById("userAge");
        inputField.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                tellAge();
            }
        })
    </script>

</body>
</html>
